<!doctype html>
<html lang="zh-CN">
	<head>
		<meta
			name="viewport"
			id="viewport"
			content="initial-scale=1.0"
		/>
		<meta
			http-equiv="X-UA-Compatible"
			content="ie=edge"
		/>
		<meta charset="UTF-8" />
		<title>微信机器人管理后台</title>
		<style>
			/* ===== 启动加载动画 —— index.tsx 中 React 挂载后自动淡出 ===== */
			#boot-root {
				position: fixed;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				background: linear-gradient(160deg, #f0f4f8 0%, #e6ecf3 40%, #f4f6f9 100%);
				z-index: 2147483647;
				font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
				overflow: hidden;
				user-select: none;
				transition: opacity 0.35s ease;
			}
			#boot-root.is-done {
				opacity: 0;
				pointer-events: none;
			}

			.app-boot::before {
				content: '';
				position: absolute;
				inset: 0;
				background-image: radial-gradient(circle at 20% 30%, rgba(7, 193, 96, 0.04) 0%, transparent 50%),
					radial-gradient(circle at 80% 70%, rgba(7, 193, 96, 0.04) 0%, transparent 50%);
				pointer-events: none;
			}

			.app-boot-scene {
				position: relative;
				width: 220px;
				height: 220px;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.app-boot-glow {
				position: absolute;
				width: 120px;
				height: 120px;
				border-radius: 50%;
				background: radial-gradient(circle, rgba(7, 193, 96, 0.18) 0%, transparent 70%);
				animation: glow-breathe 2.4s ease-in-out infinite;
			}

			@keyframes glow-breathe {
				0%,
				100% {
					transform: scale(0.9);
					opacity: 0.5;
				}
				50% {
					transform: scale(1.3);
					opacity: 1;
				}
			}

			.app-boot-orbit {
				position: absolute;
				border: 2px dashed rgba(7, 193, 96, 0.25);
				border-radius: 50%;
				animation: orbit-spin 5s linear infinite;
			}
			.app-boot-orbit--outer {
				width: 190px;
				height: 190px;
			}
			.app-boot-orbit--inner {
				width: 148px;
				height: 148px;
				animation-duration: 3.6s;
				animation-direction: reverse;
				border-color: rgba(7, 193, 96, 0.15);
			}

			@keyframes orbit-spin {
				from {
					transform: rotate(0deg);
				}
				to {
					transform: rotate(360deg);
				}
			}

			.app-boot-orbiter {
				position: absolute;
				width: 8px;
				height: 8px;
				background: #07c160;
				border-radius: 50%;
				top: -4px;
				left: calc(50% - 4px);
				box-shadow:
					0 0 10px rgba(7, 193, 96, 0.5),
					0 0 20px rgba(7, 193, 96, 0.25);
			}
			.app-boot-orbiter--bottom {
				top: auto;
				bottom: -4px;
			}

			.app-boot-robot {
				font-size: 80px;
				position: relative;
				z-index: 1;
				animation: robot-float 2s ease-in-out infinite;
				filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.08));
				line-height: 1;
			}

			@keyframes robot-float {
				0%,
				100% {
					transform: translateY(0) scale(1);
				}
				50% {
					transform: translateY(-14px) scale(1.07);
				}
			}

			.app-boot-bubble {
				position: absolute;
				background: rgba(7, 193, 96, 0.12);
				border-radius: 18px 18px 18px 4px;
				animation: bubble-rise 3.2s ease-in infinite;
				pointer-events: none;
			}
			.app-boot-bubble--1 {
				width: 52px;
				height: 34px;
				left: -20px;
				bottom: 10px;
				animation-delay: 0s;
			}
			.app-boot-bubble--2 {
				width: 40px;
				height: 28px;
				right: -12px;
				bottom: 50px;
				animation-delay: 1.1s;
				border-radius: 18px 18px 4px 18px;
			}
			.app-boot-bubble--3 {
				width: 44px;
				height: 30px;
				left: 10px;
				bottom: -10px;
				animation-delay: 2.2s;
				background: rgba(7, 193, 96, 0.08);
			}

			@keyframes bubble-rise {
				0% {
					transform: translateY(0) scale(0.6);
					opacity: 0;
				}
				15% {
					opacity: 1;
				}
				40% {
					transform: translateY(-46px) scale(1);
					opacity: 0.7;
				}
				100% {
					transform: translateY(-100px) scale(0.8);
					opacity: 0;
				}
			}

			.app-boot-info {
				margin-top: 36px;
				text-align: center;
			}

			.app-boot-title {
				font-size: 22px;
				font-weight: 700;
				color: #1a1a2e;
				margin: 0 0 10px;
				letter-spacing: 2px;
			}

			.app-boot-subtitle {
				font-size: 14px;
				color: #999;
				margin: 0;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.app-boot-dots {
				display: inline-flex;
				gap: 5px;
				margin-left: 2px;
			}
			.app-boot-dots span {
				width: 7px;
				height: 7px;
				background: #07c160;
				border-radius: 50%;
				animation: dot-blink 1.4s ease-in-out infinite;
			}
			.app-boot-dots span:nth-child(2) {
				animation-delay: 0.2s;
			}
			.app-boot-dots span:nth-child(3) {
				animation-delay: 0.4s;
			}

			@keyframes dot-blink {
				0%,
				80%,
				100% {
					opacity: 0.15;
					transform: scale(0.7);
				}
				40% {
					opacity: 1;
					transform: scale(1.3);
				}
			}

			.app-boot-bar {
				position: fixed;
				bottom: 0;
				left: 0;
				height: 3px;
				border-radius: 0 2px 2px 0;
				background: linear-gradient(90deg, #07c160, #2dc100, #07c160);
				background-size: 200% 100%;
				animation: bar-scan 2s ease-in-out infinite;
			}

			@keyframes bar-scan {
				0% {
					width: 0%;
					left: 0%;
				}
				50% {
					width: 50%;
					left: 25%;
				}
				100% {
					width: 0%;
					left: 100%;
				}
			}
		</style>
	</head>

	<body>
		<!-- 启动屏：独立于 #root，React 不会触碰，index.tsx 负责淡出 -->
		<div
			id="boot-root"
			class="app-boot"
		>
			<div class="app-boot-scene">
				<div class="app-boot-glow"></div>
				<div class="app-boot-orbit app-boot-orbit--outer">
					<div class="app-boot-orbiter"></div>
					<div class="app-boot-orbiter app-boot-orbiter--bottom"></div>
				</div>
				<div class="app-boot-orbit app-boot-orbit--inner">
					<div class="app-boot-orbiter"></div>
					<div class="app-boot-orbiter app-boot-orbiter--bottom"></div>
				</div>
				<span class="app-boot-robot">🤖</span>
				<div class="app-boot-bubble app-boot-bubble--1"></div>
				<div class="app-boot-bubble app-boot-bubble--2"></div>
				<div class="app-boot-bubble app-boot-bubble--3"></div>
			</div>
			<div class="app-boot-info">
				<p class="app-boot-title">微信机器人管理后台</p>
				<p class="app-boot-subtitle">
					资源加载中<span class="app-boot-dots"><span></span><span></span><span></span></span>
				</p>
			</div>
			<div class="app-boot-bar"></div>
		</div>
		<div id="root"></div>
	</body>
</html>
